<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="PI Expenses"/>
<meta name="theme-color" content="#ffffff"/>
<title>Prensa Internacional — Field Ledger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
:root{
  --red:#660000;--dark:#333;--cream:#ffffcc;
  --bg:#f0ede8;--card:#fff;
  --text:#1a1a1a;--t2:#555;--t3:#999;
  --bdr:rgba(0,0,0,.10);--bdr2:rgba(0,0,0,.18);
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);}
.shell{display:flex;flex-direction:column;height:100%;max-width:900px;margin:0 auto;}
.topbar{background:#fff;padding:calc(var(--st)+10px) 18px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:2.5px solid var(--red);flex-shrink:0;}
.topbar-logo{height:40px;width:auto;}
.topbar-title{font-family:'DM Sans',sans-serif;font-size:20px;font-weight:600;color:var(--red);letter-spacing:0.5px;}
.top-right{display:flex;align-items:center;gap:10px;}
.sync-info{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);}
.year-pill{font-family:'DM Mono',monospace;font-size:10px;color:var(--dark);border:.5px solid rgba(51,51,51,.3);padding:3px 10px;border-radius:20px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:2px solid var(--red);display:flex;padding-bottom:var(--sb);z-index:100;max-width:900px;margin:0 auto;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border:none;background:transparent;cursor:pointer;color:rgba(255,255,204,.35);font-size:9px;font-family:'DM Sans',sans-serif;transition:color .15s;}
.nb.on{color:var(--cream);}
.nb svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(74px + var(--sb));}
.sec{display:none;}.sec.on{display:block;}
